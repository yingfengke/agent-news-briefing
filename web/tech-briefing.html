        });

        // 按固定顺序渲染分类区块
        let globalIndex = 0;
        CATEGORY_ORDER.forEach(cat => {
          if (!groups[cat]) return;
          const header = document.createElement('div');
          header.className = 'category-header';
          header.textContent = `${cat}（${groups[cat].length}条）`;
          list.appendChild(header);

          groups[cat].forEach((item) => {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
            <div class="card-meta">
              <span class="card-index">No.${String(++globalIndex).padStart(2, '0')}</span>
              ${item.source ? `<span class="source-tag">${item.source}</span>` : ''}${item.published_at_disp ? `<span class="source-tag" style="color:#aaa;background:#f0f0ee;">发布于 ${item.published_at_disp}</span>` : ''}${item.tags && item.tags.length ? item.tags.filter(t => t !== item.category).map(t => `<span class="tag-tag">${t}</span>`).join('') : ''}
            </div>
            <div class="card-title">${item.title}</div>
            <div class="card-summary">${item.summary}</div>
            <div class="card-bottom">
              <a class="card-link" href="${item.link}" target="_blank">阅读原文</a>
              ${item.score > 0 ? `<span class="score-badge ${item.score >= 4 ? 'high' : item.score >= 3 ? 'mid' : 'low'}">${Number(item.score).toFixed(1)}</span>` : ''}
            </div>
          `;
            list.appendChild(card);
          });
        });

        // 处理不在 CATEGORY_ORDER 中的分类
        Object.keys(groups).forEach(cat => {
          if (CATEGORY_ORDER.includes(cat)) return;
          const header = document.createElement('div');
          header.className = 'category-header';
          header.textContent = `${cat}（${groups[cat].length}条）`;
          list.appendChild(header);

          groups[cat].forEach((item) => {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
            <div class="card-meta">
              <span class="card-index">No.${String(++globalIndex).padStart(2, '0')}</span>
              ${item.source ? `<span class="source-tag">${item.source}</span>` : ''}${item.published_at_disp ? `<span class="source-tag" style="color:#aaa;background:#f0f0ee;">发布于 ${item.published_at_disp}</span>` : ''}${item.tags && item.tags.length ? item.tags.filter(t => t !== item.category).map(t => `<span class="tag-tag">${t}</span>`).join('') : ''}
            </div>
            <div class="card-title">${item.title}</div>
            <div class="card-summary">${item.summary}</div>
            <div class="card-bottom">
              <a class="card-link" href="${item.link}" target="_blank">阅读原文</a>
              ${item.score > 0 ? `<span class="score-badge ${item.score >= 4 ? 'high' : item.score >= 3 ? 'mid' : 'low'}">${Number(item.score).toFixed(1)}</span>` : ''}
            </div>
          `;
            list.appendChild(card);
          });
        });

        list.classList.add('visible');

        // 项目推荐（本周热门学习项目）
        const projCard = document.getElementById('projects-card');
        if (projCard && __PROJECTS__ && __PROJECTS__.length) {
          const pHeader = document.createElement('div');
          pHeader.className = 'category-header';
          pHeader.textContent = `本周热门学习项目（${__PROJECTS__.length}条）`;
          projCard.appendChild(pHeader);
          __PROJECTS__.forEach(p => {
            const pc = document.createElement('div');
            pc.className = 'news-card';
            pc.innerHTML = `
              <div class="card-title"><a href="${p.link}" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px solid #1a1a1a;">${p.name}</a></div>
              <div class="card-summary">${p.desc || ''}</div>
              <div class="card-meta">
                ${p.tag ? `<span class="tag-tag">${p.tag}</span>` : ''}
                ${p.stars ? `<span class="source-tag">${p.stars}</span>` : ''}
              </div>
            `;
            projCard.appendChild(pc);
          });
          projCard.classList.add('visible');
        }

        // 深度分析
        if (__DAILY_ANALYSIS__) {
          document.getElementById('analysis-content').textContent = __DAILY_ANALYSIS__;
          ac.classList.add('visible');
        }

        btn.disabled = false;
        btn.textContent = '🔄 刷新';
      }, 800);
    }

    window.addEventListener('DOMContentLoaded', generateBriefing);
  </script>

</body>
</html>
