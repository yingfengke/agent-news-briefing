name: AI Agent 开发者晨报

on:
  # 每天早上 6:00 北京时间 (22:00 UTC)
  schedule:
    - cron: '0 22 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  morning-briefing:
    if: github.event.schedule == '0 22 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    # 所有步骤共享的环境变量（来自 GitHub Secrets，无一硬编码）
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_KEY: ${{ secrets.API_KEY }}
      MODEL_NAME: ${{ secrets.MODEL_NAME }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      AUTH_CODE: ${{ secrets.AUTH_CODE }}
      RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip check

      - name: 依赖安全审计
        run: |
          pip install pip-audit
          pip-audit --desc on -r requirements.txt || (echo "::warning::存在已知漏洞依赖，建议及时更新" && exit 1)

      # 恢复 URL 去重缓存（状态文件不推送至仓库，通过 Actions Cache 持久化）
      - name: 恢复 URL 去重缓存
        uses: actions/cache@v6
        id: url-dedup-cache
        with:
          path: .url_dedup_db.json
          key: url-dedup-db-${{ github.run_id }}
          restore-keys: |
            url-dedup-db-

      # ============================================================
      # 以下关键步骤使用 retry 机制：
      #   失败后每隔 5 分钟自动重试，最多 3 次
      #   覆盖网络超时、API 限流、SMTP 临时故障等场景
      # ============================================================

      - name: ① 抓取新闻 + AI 分析 + 生成 HTML（失败自动重试）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 300
          command: python -m src.main

      - name: ② 发送邮件推送（失败自动重试）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 300
          command: python -m src.send_email

      - name: ③ 提交并推送网页文件（标准 git push，贡献图计数）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 提交作者邮箱：复用项目发件邮箱 secret（须为 GitHub 账号已绑定邮箱，贡献图绿点才会计入）。
          # 此邮箱每人不同，fork 后请在自己仓库的 Secrets 中配置 SENDER_EMAIL。
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ env.SENDER_EMAIL }}"
          git add web/index.html web/tech-briefing.html web/tech-briefing.template.html web/rss.xml
          git diff --cached --quiet || git commit -m "每日简报自动更新"
          git push origin main

      # 保存 URL 去重缓存供下次运行使用
      - name: 保存 URL 去重缓存
        uses: actions/cache/save@v6
        with:
          path: .url_dedup_db.json
          key: url-dedup-db-${{ github.run_id }}
