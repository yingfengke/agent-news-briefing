name: 每日科技早餐简报

on:
  # 每天早上 9:00 北京时间 (01:00 UTC)
  # ⚠️ 新仓库 cron 首次注册需 24-48h，若持续未触发：
  #   方案A: 手动点 Run workflow → 立即生效
  #   方案B: 用 https://cron-job.org 免费定时调用 GitHub API
  schedule:
    - cron: '0 1 * * *'
  # 支持手动触发（用于测试和补发）
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # 所有步骤共享的环境变量（来自 GitHub Secrets）
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_KEY: ${{ secrets.API_KEY }}
      MODEL_NAME: ${{ secrets.MODEL_NAME }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      AUTH_CODE: ${{ secrets.AUTH_CODE }}
      RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install python-dotenv

      - name: ① 抓取新闻 + AI 分析 + 生成 HTML
        run: python generate_briefing.py

      - name: ② 发送邮件推送
        run: python send_email.py

      - name: 复制首页 (Pages 需要 index.html)
        run: cp tech-briefing.html index.html

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 每日简报自动更新 $(date +'%Y-%m-%d')"
          git push

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
