name: 每日科技早餐简报

on:
  # 临时：推送触发（新增中文网站爬虫）
  push:
    branches: [main]
  # 每天早上 6:00 北京时间 (22:00 UTC)
  schedule:
    - cron: '0 22 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # 所有步骤共享的环境变量（来自 GitHub Secrets，无一硬编码）
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_KEY: ${{ secrets.API_KEY }}
      MODEL_NAME: ${{ secrets.MODEL_NAME }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      AUTH_CODE: ${{ secrets.AUTH_CODE }}
      RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install python-dotenv

      # ============================================================
      # 以下关键步骤使用 retry 机制：
      #   失败后每隔 5 分钟自动重试，最多 3 次
      #   覆盖网络超时、API 限流、SMTP 临时故障等场景
      # ============================================================

      - name: ① 抓取新闻 + AI 分析 + 生成 HTML（失败自动重试）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 300
          command: python generate_briefing.py

      - name: ② 发送邮件推送（失败自动重试）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 300
          command: python send_email.py

      - name: ③ 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 每日简报自动更新 $(date +'%Y-%m-%d')"
          git push

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
