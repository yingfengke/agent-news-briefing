name: AI Agent 开发者晨报

on:
  # 每天早上 6:00 北京时间 (22:00 UTC) — 与 Cloudflare Worker 双重保障
  schedule:
    - cron: '0 22 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # 所有步骤共享的环境变量（来自 GitHub Secrets，无一硬编码）
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_KEY: ${{ secrets.API_KEY }}
      MODEL_NAME: ${{ secrets.MODEL_NAME }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      AUTH_CODE: ${{ secrets.AUTH_CODE }}
      RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 安装 Playwright + Chromium（含系统库）
        run: |
          python -m playwright install --with-deps chromium

      # ============================================================
      # 以下关键步骤使用 retry 机制：
      #   失败后每隔 5 分钟自动重试，最多 3 次
      #   覆盖网络超时、API 限流、SMTP 临时故障等场景
      # ============================================================

      - name: ① 抓取新闻 + AI 分析 + 生成 HTML（失败自动重试）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 300
          command: python generate_briefing.py

      - name: ② 发送邮件推送（失败自动重试）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 300
          command: python send_email.py

      - name: ③ 提交并推送更新（失败自动重试）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            # 只添加工作流生成的文件，避免误加 .env 等敏感文件
            git add tech-briefing.html index.html email_content.html email_content.txt
            git diff --quiet && git diff --staged --quiet || git commit -m "🤖 每日简报自动更新 $(date +'%Y-%m-%d')"
            if git push; then
              echo "✅ 推送成功"
              break
            else
              echo "⚠️ 第${i}次推送失败，10秒后拉取重试..."
              sleep 10
              # 优先 rebase，失败则用 merge 兜底
              git pull --rebase --autostash || (git rebase --abort 2>/dev/null; git pull --no-rebase)
            fi
          done

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
