name: AI Agent 开发者晨报

on:
  # 每天早上 6:00 北京时间 (22:00 UTC)
  schedule:
    - cron: '0 22 * * *'
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # 所有步骤共享的环境变量（来自 GitHub Secrets，无一硬编码）
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_KEY: ${{ secrets.API_KEY }}
      MODEL_NAME: ${{ secrets.MODEL_NAME }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      AUTH_CODE: ${{ secrets.AUTH_CODE }}
      RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 安装 Playwright + Chromium（含系统库）
        run: |
          python -m playwright install --with-deps chromium

      # ============================================================
      # 以下关键步骤使用 retry 机制：
      #   失败后每隔 5 分钟自动重试，最多 3 次
      #   覆盖网络超时、API 限流、SMTP 临时故障等场景
      # ============================================================

      - name: ① 抓取新闻 + AI 分析 + 生成 HTML（失败自动重试）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 300
          command: python generate_briefing.py

      - name: ② 发送邮件推送（失败自动重试）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 300
          command: python send_email.py

      - name: ③ 通过 GitHub API 更新网页文件（Pages 自动从 main branch 部署）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/workflows/github_api_push.py
