<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI &amp; Agent 开发者晨报</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background-color: #f5f4f0; color: #1a1a1a;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 60px 20px 80px;
    }
    .header {
      text-align: left; width: 100%; max-width: 720px;
      margin-bottom: 40px; padding-left: 20px; border-left: 4px solid #1a1a1a;
    }
    .header .subtitle { font-size: 0.75rem; color: #aaa; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
    .header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
    .header p { margin-top: 8px; font-size: 0.88rem; color: #888; }

    .btn-generate {
      display: inline-flex; align-items: center; gap: 10px;
      background-color: #1a1a1a; color: #fff;
      font-size: 0.95rem; font-weight: 600; padding: 13px 30px;
      border: 2px solid #1a1a1a; border-radius: 50px; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.03em;
    }
    .btn-generate:hover { background-color: #fff; color: #1a1a1a; transform: translateY(-2px); }
    .btn-generate:active { transform: translateY(0); }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    .loading {
      margin-top: 32px; font-size: 0.9rem; color: #888;
      display: none; align-items: center; gap: 10px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading.visible { display: flex; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading .dots { display: flex; gap: 5px; }
    .loading .dot { width: 6px; height: 6px; background: #aaa; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
    .loading .dot:nth-child(2) { animation-delay: 0.2s; }
    .loading .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    .news-list {
      margin-top: 36px; width: 100%; max-width: 720px;
      display: none; flex-direction: column; gap: 18px;
    }
    .news-list.visible { display: flex; }

    .news-card {
      background: #fff; border: 1px solid #e5e5e5; border-radius: 14px;
      padding: 22px 26px; transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .news-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.07); }
    .news-card:nth-child(1) { animation-delay: 0.05s; }
    .news-card:nth-child(2) { animation-delay: 0.1s; }
    .news-card:nth-child(3) { animation-delay: 0.15s; }
    .news-card:nth-child(4) { animation-delay: 0.2s; }
    .news-card:nth-child(5) { animation-delay: 0.25s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .news-card .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .news-card .card-index { font-size: 0.72rem; font-weight: 700; color: #ccc; letter-spacing: 0.1em; }
    .news-card .source-tag { font-size: 0.68rem; color: #888; background: #f0f0ee; padding: 2px 10px; border-radius: 20px; }
    .news-card .tag-tag { font-size: 0.68rem; color: #534AB7; background: #EEEDFE; padding: 2px 10px; border-radius: 20px; margin-left: 4px; }
    .news-card .score-stars { font-size: 0.68rem; margin-left: 4px; }
    .news-card .card-title { font-size: 1rem; font-weight: 700; line-height: 1.5; color: #111; margin-bottom: 10px; }
    .news-card .card-summary { font-size: 0.85rem; color: #555; line-height: 1.75; margin-bottom: 14px; }
    .news-card .card-link { font-size: 0.8rem; font-weight: 600; color: #1a1a1a; text-decoration: none; border-bottom: 1.5px solid #1a1a1a; padding-bottom: 1px; transition: opacity 0.2s; }
    .news-card .card-link:hover { opacity: 0.5; }

    /* 深度分析卡片 */
    .analysis-card {
      background: #1a1a1a; color: #e8e8e8; border-radius: 14px;
      padding: 26px 28px; margin-top: 20px; width: 100%; max-width: 720px;
      display: none; animation: fadeUp 0.5s ease both;
    }
    .analysis-card.visible { display: block; }
    .analysis-card .label { font-size: 0.72rem; color: #888; letter-spacing: 0.12em; margin-bottom: 12px; text-transform: uppercase; }
    .analysis-card .content { font-size: 0.88rem; line-height: 1.8; color: #ccc; }

    .empty-state {
      margin-top: 40px; text-align: center; color: #bbb; display: none;
    }
    .empty-state.visible { display: block; }
    .empty-state .icon-big { font-size: 2.8rem; margin-bottom: 14px; }
    .empty-state p { font-size: 0.88rem; line-height: 1.8; }
    .empty-state .hint { margin-top: 6px; font-size: 0.8rem; color: #ccc; }

    .timestamp { margin-top: 16px; font-size: 0.75rem; color: #bbb; text-align: right; width: 100%; max-width: 720px; display: none; }
    .timestamp.visible { display: block; }
  </style>

    // 渲染简报
    function generateBriefing() {
      const btn     = document.querySelector('.btn-generate');
      const loading = document.getElementById('loading');
      const list    = document.getElementById('news-list');
      const empty   = document.getElementById('empty-state');
      const ts      = document.getElementById('timestamp');
      const ac      = document.getElementById('analysis-card');

      btn.disabled = true;
      list.innerHTML = '';
      list.classList.remove('visible');
      ac.classList.remove('visible');
      empty.classList.remove('visible');
      ts.classList.remove('visible');
      loading.classList.add('visible');

        loading.classList.remove('visible');

        if (!__NEWS_DATA__ || __NEWS_DATA__.length === 0) {
          empty.classList.add('visible');
          btn.disabled = false;
          return;
        }

          card.innerHTML = `
            <div class="card-meta">

              ${item.score ? `<span class="score-stars">${'⭐'.repeat(item.score)}</span>` : ''}

            <div class="card-title">${item.title}</div>
            <div class="card-summary">${item.summary}</div>
            <a class="card-link" href="${item.link}" target="_blank">阅读原文 →</a>
          `;
          list.appendChild(card);
        });

        ts.classList.add('visible');

        btn.textContent = '🔄 刷新';
